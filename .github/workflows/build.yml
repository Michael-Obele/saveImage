name: Build Extension

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            command: zip
            artifact_name: save-image-chrome
            artifact_path: .output/*-chrome.zip
          - browser: firefox
            command: zip:firefox
            artifact_name: save-image-firefox
            artifact_path: .output/*-firefox.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Inject build version
        run: |
          set -e
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          else
            VER="0.0.${GITHUB_RUN_NUMBER}"
          fi
          node -e "const fs=require('fs'),p=process.argv[1]; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=process.argv[2]; fs.writeFileSync(p, JSON.stringify(pkg,null,2)+'\n')" "$(pwd)/package.json" "$VER"
          echo "version: $VER"

      - name: Prepare WXT (generates .wxt/ types)
        run: bun run postinstall

      - name: Type-check
        run: bun run check

      - name: Build ${{ matrix.browser }} zip
        run: bun run ${{ matrix.command }}

      - name: Verify zip exists
        id: zip
        run: |
          set -e
          ZIP=$(ls ${{ matrix.artifact_path }} 2>/dev/null | head -n 1)
          if [ -z "$ZIP" ]; then
            echo "::error::No zip matching '${{ matrix.artifact_path }}' was produced."
            ls -la .output || true
            exit 1
          fi
          echo "Produced artifact: $ZIP"
          # Resolve to absolute path so upload-artifact can find it regardless of CWD
          echo "path=$(realpath "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          set -e
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            ZIP=$(ls dist/save-image-chrome/*.zip | head -1)
            VER=$(echo "$ZIP" | sed 's/.*save-image-chrome-//; s/\.zip$//')
            echo "name=v${VER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/save-image-chrome/*.zip
            dist/save-image-firefox/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
