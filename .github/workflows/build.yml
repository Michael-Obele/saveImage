name: Build Extension

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # ponytail: needed for softprops/action-gh-release to create releases

jobs:
  build:
    name: Build ${{ matrix.browser }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - browser: chrome
            command: zip
            artifact_name: save-image-chrome
            artifact_path: .output/*-chrome.zip
          - browser: firefox
            command: zip:firefox
            artifact_name: save-image-firefox
            artifact_path: .output/*-firefox.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Bump version (patch +0.0.1)
        # ponytail: read current, +0.0.1, write back. WXT picks up package.json version for manifest + zip name.
        # Skipped on tag pushes — the tag itself (v0.0.1) is the source of truth there.
        # ponytail: node -p runs in eval mode where require('./...') resolves to [eval], not cwd — use fs + cwd instead.
        if: github.ref_type != 'tag'
        run: |
          set -e
          PKG="$(pwd)/package.json"
          CURRENT=$(node -e "const fs=require('fs'); console.log(JSON.parse(fs.readFileSync(process.argv[1],'utf8')).version)" "$PKG")
          IFS='.' read -r MAJOR MINOR PATCH <<<"$CURRENT"
          NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
          node -e "const fs=require('fs'),p=process.argv[1],v=process.argv[2]; const pkg=JSON.parse(fs.readFileSync(p,'utf8')); pkg.version=v; fs.writeFileSync(p, JSON.stringify(pkg,null,2)+'\n')" "$PKG" "$NEXT"
          echo "version: $CURRENT -> $NEXT"

      - name: Prepare WXT (generates .wxt/ types)
        run: bun run postinstall

      - name: Type-check
        run: bun run check

      - name: Build ${{ matrix.browser }} zip
        run: bun run ${{ matrix.command }}

      - name: Verify zip exists
        id: zip
        run: |
          set -e
          ZIP=$(ls ${{ matrix.artifact_path }} 2>/dev/null | head -n 1)
          if [ -z "$ZIP" ]; then
            echo "::error::No zip matching '${{ matrix.artifact_path }}' was produced."
            ls -la .output || true
            exit 1
          fi
          echo "Produced artifact: $ZIP"
          # Resolve to absolute path so upload-artifact can find it regardless of CWD
          echo "path=$(realpath "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Upload zip artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ steps.zip.outputs.path }}
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    # ponytail: fire on every main push (auto-bumped version) and on tag pushes. Skip PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Download all zips
        uses: actions/download-artifact@v4
        with:
          path: dist

      # ponytail: tag pushes use tag name; main pushes use bumped version + short sha so each build is its own release
      - name: Resolve tag
        id: tag
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "name=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # ponytail: same eval-mode pitfall — read with fs + cwd, not require('./...')
            VERSION=$(node -e "console.log(JSON.parse(require('fs').readFileSync(process.cwd()+'/package.json','utf8')).version)")
            echo "name=v${VERSION}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.tag.outputs.name }}
          tag_name: ${{ steps.tag.outputs.name }}
          files: |
            dist/save-image-chrome/*.zip
            dist/save-image-firefox/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
