<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- ponytail: single master icon, render to PNGs at runtime -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cff"/>
      <stop offset="1" stop-color="#2a5fd9"/>
    </linearGradient>
  </defs>

  <!-- Rounded square frame (image) -->
  <rect x="12" y="20" width="84" height="88" rx="10" fill="url(#g)"/>
  <rect x="20" y="28" width="68" height="64" rx="4" fill="#fff" opacity="0.95"/>

  <!-- Sun -->
  <circle cx="34" cy="44" r="5" fill="#f5b942"/>
  <!-- Mountains -->
  <path d="M22 84 L42 60 L58 76 L72 64 L88 84 Z" fill="#2a5fd9"/>
  <path d="M22 84 L42 60 L58 76 L72 64 L88 84 Z" fill="#fff" opacity="0.25"/>

  <!-- Download arrow (overlapping the frame) -->
  <circle cx="96" cy="96" r="22" fill="#1a1a1a"/>
  <circle cx="96" cy="96" r="22" fill="none" stroke="#fff" stroke-width="3"/>
  <path d="M96 84 L96 106 M86 98 L96 108 L106 98"
        stroke="#fff" stroke-width="5"
        stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
